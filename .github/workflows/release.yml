name: Build Release Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            build_cmd: npm --prefix backend run package:linux
          - os: windows-latest
            build_cmd: npm --prefix backend run package:win
          - os: macos-latest
            build_cmd: npm --prefix backend run package:mac

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Install backend dependencies
        run: npm --prefix backend ci

      - name: Build platform installers
        run: ${{ matrix.build_cmd }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Colon-IDE-${{ matrix.os }}
          path: |
            backend/dist/*.AppImage
            backend/dist/*.deb
            backend/dist/*.dmg
            backend/dist/*Setup*.exe
            backend/dist/*.yml
            backend/dist/*.blockmap
          if-no-files-found: warn
